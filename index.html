<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — IT & Engineering</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10; --surface: #111318; --surface2: #181c23; --border: #ffffff0f;
    --accent: #00e5a0; --accent3: #4d9fff; --text: #f0f2f7; --muted: #6b7280;
    --closed: #00e5a0; --open: #4d9fff; --inprogress: #f0b429; --waiting: #ff6b35;
    --unassigned: #ff00ff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Mono',monospace; background:var(--bg); color:var(--text); min-height:100vh; }
  body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }
  .container { position:relative; z-index:1; max-width:1400px; margin:0 auto; padding:40px 24px; }
  header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:32px; flex-wrap:wrap; gap:20px; border-bottom:1px solid var(--border); padding-bottom:20px; }
  .logo-area h1 { font-family:'Syne',sans-serif; font-size:24px; font-weight:800; }
  .logo-area h1 span { color:var(--accent); }
  #loading { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; gap:20px; }
  .spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  #content { display:none; animation:fadeIn .4s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)} }
  .overview-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-bottom:28px; }
  .eng-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; cursor:pointer; transition:all .2s; position:relative; overflow:hidden; }
  .eng-card:hover { transform:translateY(-3px); background:var(--surface2); }
  .eng-card.active { border:1px solid white; background:var(--surface2); }
  .eng-card-name { font-family:'Syne',sans-serif; font-size:15px; font-weight:800; margin-bottom:12px; }
  .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px; }
  @media(max-width:700px){ .stats-grid { grid-template-columns:repeat(2,1fr); } }
  .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; position:relative; cursor:pointer; transition:all 0.2s; opacity:0.5; }
  .stat-card.active-slice { border:1px solid white; opacity:1; transform:scale(1.02); }
  .stat-card::after { content:''; position:absolute; bottom:0; left:0; right:0; height:3px; }
  .stat-card.open::after { background:var(--open); }
  .stat-card.inprogress::after { background:var(--inprogress); }
  .stat-card.waiting::after { background:var(--waiting); }
  .stat-card.closed::after { background:var(--closed); }
  .stat-value { font-family:'Syne',sans-serif; font-size:42px; font-weight:800; line-height:1; margin-top:10px; }
  .table-section { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  .table-scroll { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:12px; min-width:1000px; }
  th { padding:12px 16px; text-align:left; background:var(--surface2); color:var(--muted); text-transform:uppercase; font-size:10px; }
  td { padding:10px 16px; border-bottom:1px solid var(--border); vertical-align:middle; }
  .status-badge { display:inline-flex; align-items:center; gap:5px; padding:4px 12px; border-radius:100px; font-size:10px; font-weight:700; }
  .badge-closed { background:#00e5a015; color:var(--closed); border:1px solid #00e5a030; }
  .badge-new { background:#4d9fff15; color:var(--open); border:1px solid #4d9fff30; }
  .badge-inprogress { background:#f0b42915; color:var(--inprogress); border:1px solid #f0b42930; }
  .badge-waiting { background:#ff6b3515; color:var(--waiting); border:1px solid #ff6b3530; }
  .badge-unassigned { background:#ff00ff15; color:var(--unassigned); border:1px solid #ff00ff40; animation:pulse 2s infinite; }
  @keyframes pulse { 0%{opacity:1}50%{opacity:0.6}100%{opacity:1} }
  .refresh-btn { background:var(--accent); border:none; color:#000; padding:10px 20px; border-radius:8px; cursor:pointer; font-family:'Syne',sans-serif; font-size:12px; font-weight:700; }
  .assign-wrap { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .assign-select { background:var(--surface2); color:var(--text); border:1px solid var(--border); border-radius:6px; padding:4px 8px; font-family:'DM Mono',monospace; font-size:11px; cursor:pointer; outline:none; }
  .assign-select.unassigned { background:#1a0a1a; color:var(--unassigned); border:1px solid #ff00ff40; animation:pulse 2s infinite; }
  .assign-btn { background:var(--unassigned); color:#000; border:none; border-radius:6px; padding:4px 10px; font-family:'Syne',sans-serif; font-size:10px; font-weight:800; cursor:pointer; transition:all .2s; white-space:nowrap; }
  .assign-btn.reassign { background:var(--accent3); }
  .assign-btn:disabled { opacity:0.4; cursor:not-allowed; }
  .status-select { background:var(--surface2); color:var(--text); border:1px solid var(--border); border-radius:6px; padding:4px 8px; font-family:'DM Mono',monospace; font-size:11px; cursor:pointer; outline:none; width:100%; }
  .status-select:hover { border-color:var(--accent); }
  .spare-wrap { display:flex; flex-direction:column; gap:4px; }
  .spare-input { background:var(--surface2); color:var(--text); border:1px solid var(--waiting); border-radius:6px; padding:4px 8px; font-family:'DM Mono',monospace; font-size:11px; outline:none; width:150px; }
  .spare-input::placeholder { color:var(--muted); }
  .save-btn { background:var(--waiting); color:#000; border:none; border-radius:6px; padding:3px 8px; font-family:'Syne',sans-serif; font-size:10px; font-weight:800; cursor:pointer; width:fit-content; }
  .save-btn:disabled { opacity:0.4; cursor:not-allowed; }
  .spare-text { color:var(--waiting); font-size:11px; }
  #toast { position:fixed; bottom:30px; right:30px; color:#000; padding:12px 20px; border-radius:10px; font-family:'Syne',sans-serif; font-weight:800; font-size:13px; transform:translateY(100px); opacity:0; transition:all .3s; z-index:999; }
  #toast.show { transform:translateY(0); opacity:1; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-area">
      <h1>Service <span>Tickets</span></h1>
      <p style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-top:5px;">Dashboard</p>
    </div>
    <button class="refresh-btn" onclick="loadData()" id="rbtn">↻ Refresh</button>
  </header>

  <div id="loading"><div class="spinner"></div><p>Connecting to Sheets...</p></div>

  <div id="content">
    <div class="overview-grid" id="overview-grid"></div>
    <div style="font-family:Syne;font-size:18px;font-weight:800;margin-bottom:20px;color:var(--accent);" id="view-title">All Staff Overview</div>
    <div class="stats-grid">
      <div class="stat-card open active-slice" id="btn-New" onclick="toggleSlice('New')">
        <small style="color:var(--muted)">NEW</small>
        <div class="stat-value" id="count-open">0</div>
      </div>
      <div class="stat-card inprogress active-slice" id="btn-In Progress" onclick="toggleSlice('In Progress')">
        <small style="color:var(--muted)">IN PROGRESS</small>
        <div class="stat-value" id="count-inprogress">0</div>
      </div>
      <div class="stat-card waiting active-slice" id="btn-Waiting" onclick="toggleSlice('Waiting')">
        <small style="color:var(--muted)">WAITING FOR SPARE PARTS</small>
        <div class="stat-value" id="count-waiting">0</div>
      </div>
      <div class="stat-card closed active-slice" id="btn-Closed" onclick="toggleSlice('Closed')">
        <small style="color:var(--muted)">CLOSED</small>
        <div class="stat-value" id="count-closed">0</div>
      </div>
    </div>
    <div class="table-section">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Assignee</th>
              <th>Account/Clinic</th>
              <th>Status</th>
              <th>Spare Parts</th>
              <th>Duration</th>
              <th>Description</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
const SCRIPT = "https://script.google.com/macros/s/AKfycbxpNWPofPEaUC8sX01slerzchcBTE98do2Mfu_X7gDJ5oKFcJRwS63KpsdSVR_bBKVN/exec";

const ENGINEERS = [
  {name:"Shakeel",color:"#4d9fff"},
  {name:"Sam",color:"#00e5a0"},
  {name:"Bernard",color:"#f0b429"},
  {name:"Ghulam",color:"#ff6b35"},
  {name:"Ahmad",color:"#a855f7"}
];

const STATUS_OPTIONS = ["New","In Progress","Waiting","Closed"];

let allData = [];
let currentEngineer = 'all';
let selectedStatuses = ['New','In Progress','Waiting','Closed'];

window.onload = () => loadData();

function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.style.background = color || '#00e5a0';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function fetchJSONP(url) {
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Math.random().toString(36).substr(2, 9);
    const script = document.createElement('script');
    const timeout = setTimeout(() => {
      try { document.body.removeChild(script); } catch(e){}
      delete window[cbName];
      reject(new Error('Timeout'));
    }, 15000);
    window[cbName] = (data) => {
      clearTimeout(timeout);
      try { document.body.removeChild(script); } catch(e){}
      delete window[cbName];
      resolve(data);
    };
    script.onerror = () => {
      clearTimeout(timeout);
      try { document.body.removeChild(script); } catch(e){}
      delete window[cbName];
      reject(new Error('Script error'));
    };
    script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName + '&t=' + Date.now();
    document.body.appendChild(script);
  });
}

async function loadData() {
  const btn = document.getElementById('rbtn');
  btn.style.opacity = '0.5';
  btn.innerText = '↻ Loading...';
  try {
    const data = await fetchJSONP(SCRIPT);
    // Filter empty rows and sort newest first
    allData = data
      .filter(r => r['Timestamp'] && r['Timestamp'].toString().trim() !== '')
      .sort((a, b) => new Date(b['Timestamp']) - new Date(a['Timestamp']));
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    refreshUI();
  } catch(e) {
    alert("Sync Error: " + e.message);
  }
  btn.style.opacity = '1';
  btn.innerText = '↻ Refresh';
}

function refreshUI() { renderOverview(); updateStats(); renderTable(); }

function getVal(obj, ...keys) {
  for (let key of keys) {
    if (obj[key] !== undefined && obj[key] !== null && obj[key].toString().trim() !== '')
      return obj[key].toString().trim();
  }
  return "";
}

function getStatus(r) {
  return getVal(r,'Current Status','Status') || 'New';
}

function calculateDuration(start, end) {
  const s = new Date(start);
  const e = end ? new Date(end) : new Date();
  if (isNaN(s.getTime())) return '-';
  const diffMs = e - s;
  const diffHrs = Math.floor(diffMs / (1000 * 60 * 60));
  const diffDays = Math.floor(diffHrs / 24);
  return diffDays > 0 ? `${diffDays}d ${diffHrs % 24}h` : `${diffHrs}h`;
}

function renderOverview() {
  const grid = document.getElementById('overview-grid');
  grid.innerHTML = `<div class="eng-card ${currentEngineer==='all'?'active':''}" onclick="selectEng('all')">
    <div class="eng-card-name" style="color:var(--accent)">Full Team</div>
    <div style="font-size:11px;color:var(--muted)">${allData.length} Total Tickets</div>
  </div>` + ENGINEERS.map(eng => {
    const count = allData.filter(r => getVal(r,'Name') === eng.name).length;
    return `<div class="eng-card ${currentEngineer===eng.name?'active':''}" onclick="selectEng('${eng.name}')">
      <div class="eng-card-name" style="color:${eng.color}">${eng.name}</div>
      <div style="font-size:11px;color:var(--muted)">${count} Records</div>
      <div style="position:absolute;bottom:0;left:0;right:0;height:3px;background:${eng.color}"></div>
    </div>`;
  }).join('');
}

function selectEng(name) {
  currentEngineer = name;
  document.getElementById('view-title').innerText = name === 'all' ? "All Staff Overview" : name + "'s Assigned Tickets";
  refreshUI();
}

function updateStats() {
  const tickets = currentEngineer === 'all' ? allData : allData.filter(r => getVal(r,'Name') === currentEngineer);
  const c = {closed:0, open:0, inprogress:0, waiting:0};
  tickets.forEach(r => {
    const s = getStatus(r).toLowerCase();
    if(s === 'closed') c.closed++;
    else if(s === 'in progress') c.inprogress++;
    else if(s === 'waiting') c.waiting++;
    else c.open++;
  });
  document.getElementById('count-closed').innerText = c.closed;
  document.getElementById('count-open').innerText = c.open;
  document.getElementById('count-inprogress').innerText = c.inprogress;
  document.getElementById('count-waiting').innerText = c.waiting;
}

function toggleSlice(status) {
  const index = selectedStatuses.indexOf(status);
  if (index > -1) {
    selectedStatuses.splice(index, 1);
    document.getElementById('btn-' + status).classList.remove('active-slice');
  } else {
    selectedStatuses.push(status);
    document.getElementById('btn-' + status).classList.add('active-slice');
  }
  renderTable();
}

async function assignEngineer(realIndex, selectEl, btnEl) {
  const engineerName = selectEl.value;
  if (!engineerName) { showToast('⚠ Select an engineer first!', '#ff6b35'); return; }
  btnEl.disabled = true;
  btnEl.innerText = 'Saving...';
  const ticket = allData[realIndex];
  const timestamp = getVal(ticket,'Timestamp');
  try {
    await fetchJSONP(SCRIPT + '?action=assign&timestamp=' + encodeURIComponent(timestamp) + '&name=' + encodeURIComponent(engineerName));
    allData[realIndex]['Name'] = engineerName;
    allData[realIndex]['Current Status'] = 'In Progress';
    showToast('✅ Assigned to ' + engineerName + ' → In Progress');
  } catch(e) {
    allData[realIndex]['Name'] = engineerName;
    allData[realIndex]['Current Status'] = 'In Progress';
    showToast('⚠ Updated locally only', '#f0b429');
  }
  refreshUI();
}

async function updateStatus(realIndex, newStatus, selectEl) {
  selectEl.disabled = true;
  const ticket = allData[realIndex];
  const timestamp = getVal(ticket,'Timestamp');
  try {
    await fetchJSONP(SCRIPT + '?action=updateStatus&timestamp=' + encodeURIComponent(timestamp) + '&status=' + encodeURIComponent(newStatus));
    allData[realIndex]['Current Status'] = newStatus;
    allData[realIndex]['Status'] = newStatus;
    if(newStatus !== 'Waiting') allData[realIndex]['_spareParts'] = '';
    showToast('✅ Status: ' + (newStatus === 'Waiting' ? 'Waiting for Spare Parts' : newStatus));
  } catch(e) {
    allData[realIndex]['Current Status'] = newStatus;
    showToast('⚠ Updated locally only', '#f0b429');
  }
  refreshUI();
}

async function saveSpareParts(realIndex, inputEl, btnEl) {
  const parts = inputEl.value.trim();
  if (!parts) { showToast('⚠ Enter spare parts first!', '#ff6b35'); return; }
  btnEl.disabled = true;
  btnEl.innerText = 'Saving...';
  const ticket = allData[realIndex];
  const timestamp = getVal(ticket,'Timestamp');
  try {
    await fetchJSONP(SCRIPT + '?action=updateStatus&timestamp=' + encodeURIComponent(timestamp) + '&status=Waiting&spareParts=' + encodeURIComponent(parts));
    allData[realIndex]['_spareParts'] = parts;
    showToast('🔧 Spare parts saved!');
  } catch(e) {
    allData[realIndex]['_spareParts'] = parts;
    showToast('⚠ Updated locally only', '#f0b429');
  }
  refreshUI();
}

function renderTable() {
  let tickets = currentEngineer === 'all' ? allData : allData.filter(r => getVal(r,'Name') === currentEngineer);

  if (selectedStatuses.length > 0) {
    tickets = tickets.filter(r => {
      const s = getStatus(r).toLowerCase();
      return selectedStatuses.some(status => {
        if (status === 'Waiting') return s === 'waiting';
        if (status === 'New') return s === 'new' || s === '';
        if (status === 'In Progress') return s === 'in progress';
        if (status === 'Closed') return s === 'closed';
        return false;
      });
    });
  } else { tickets = []; }

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = tickets.map((r, i) => {
    const nameVal = getVal(r,'Name');
    const statusVal = getStatus(r);
    const isUnassigned = nameVal === '';
    const realIndex = allData.indexOf(r);
    const spareParts = r['_spareParts'] || getVal(r,'What spare part is needed?');
    const isWaiting = statusVal.toLowerCase() === 'waiting';
    const engColor = ENGINEERS.find(e => e.name === nameVal)?.color || 'var(--text)';

    let bc = 'badge-new';
    if(statusVal.toLowerCase() === 'closed') bc = 'badge-closed';
    else if(statusVal.toLowerCase() === 'in progress') bc = 'badge-inprogress';
    else if(statusVal.toLowerCase() === 'waiting') bc = 'badge-waiting';
    if(isUnassigned) bc = 'badge-unassigned';

    // ✅ Assignee cell — works for both unassigned AND reassignment
    const assigneeCell = `<div class="assign-wrap">
      <select class="assign-select ${isUnassigned?'unassigned':''}" id="sel-${realIndex}">
        <option value="">${isUnassigned ? '⚠ Assign to...' : '↺ Reassign...'}</option>
        ${ENGINEERS.map(e=>`<option value="${e.name}" ${nameVal===e.name?'selected':''}>${e.name}</option>`).join('')}
      </select>
      <button class="assign-btn ${isUnassigned?'':'reassign'}" id="abtn-${realIndex}"
        onclick="assignEngineer(${realIndex},document.getElementById('sel-${realIndex}'),document.getElementById('abtn-${realIndex}'))">
        ${isUnassigned ? 'Assign ✓' : '↺'}
      </button>
    </div>`;

    const statusCell = `<select class="status-select" onchange="updateStatus(${realIndex},this.value,this)">
      ${STATUS_OPTIONS.map(s=>`<option value="${s}" ${statusVal===s?'selected':''}>${s==='Waiting'?'Waiting for Spare Parts':s}</option>`).join('')}
    </select>`;

    const spareCell = isWaiting
      ? `<div class="spare-wrap">
          ${spareParts ? `<span class="spare-text">🔧 ${spareParts}</span>` : ''}
          <input class="spare-input" id="spare-${realIndex}" placeholder="Enter parts..." value="${spareParts}"/>
          <button class="save-btn" id="sbtn-${realIndex}"
            onclick="saveSpareParts(${realIndex},document.getElementById('spare-${realIndex}'),document.getElementById('sbtn-${realIndex}'))">
            💾 Save
          </button>
        </div>`
      : `<span class="spare-text">${spareParts ? '🔧 '+spareParts : '-'}</span>`;

    return `<tr>
      <td>${i+1}</td>
      <td>${assigneeCell}</td>
      <td>${getVal(r,'Customer/Account Name','Clinic/Hospital Name') || '-'}</td>
      <td>${statusCell}</td>
      <td>${spareCell}</td>
      <td><span style="color:var(--accent3)">${calculateDuration(getVal(r,'Timestamp'), getVal(r,'Closing Date'))}</span></td>
      <td style="max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted)">
        ${getVal(r,'Problem Description','Description of the Technical Issue') || '-'}
      </td>
    </tr>`;
  }).join('');
}
</script>
</body>
</html>
