<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engineer Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10; --surface: #111318; --surface2: #181c23; --border: #ffffff0f;
    --accent: #00e5a0; --text: #f0f2f7; --muted: #6b7280;
    --closed: #00e5a0; --open: #4d9fff; --inprogress: #f0b429; --waiting: #ff6b35;
    --unassigned: #ff00ff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Mono',monospace; background:var(--bg); color:var(--text); min-height:100vh; position: relative; }
  body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }
  
  .container { position:relative; z-index:1; max-width:1400px; margin:0 auto; padding:40px 24px; }
  header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:32px; flex-wrap:wrap; gap:20px; border-bottom:1px solid var(--border); padding-bottom:20px; }
  .logo-area h1 { font-family:'Syne',sans-serif; font-size:24px; font-weight:800; }
  .logo-area h1 span { color:var(--accent); }

  /* PIN SCREEN */
  #pin-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:32px; position:fixed; inset:0; z-index:100; background:var(--bg); }
  .pin-dots { display:flex; gap:16px; }
  .pin-dot { width:18px; height:18px; border-radius:50%; border:2px solid var(--muted); transition:all .2s; }
  .pin-dot.filled { background:var(--accent); border-color:var(--accent); }
  .pin-pad { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
  .pin-key { width:72px; height:72px; border-radius:50%; border:1px solid var(--border); background:var(--surface); color:var(--text); font-family:'Syne',sans-serif; font-size:20px; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center; }

  /* STATS */
  .stats-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:16px; margin-bottom:28px; }
  .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; cursor:pointer; opacity:0.6; transition: 0.2s; }
  .stat-card.active-slice { opacity:1; border-color: white; transform: translateY(-2px); }
  .stat-value { font-family:'Syne',sans-serif; font-size:42px; font-weight:800; margin-top:10px; }

  /* TABLES */
  .table-section { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:28px; }
  .table-header { padding:16px 20px; background:var(--surface2); border-bottom:1px solid var(--border); font-family:'Syne',sans-serif; font-weight:800; }
  .table-scroll { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:12px; min-width:900px; }
  th { padding:12px 16px; text-align:left; background:var(--surface2); color:var(--muted); text-transform:uppercase; font-size:10px; }
  td { padding:12px 16px; border-bottom:1px solid var(--border); }

  /* MODAL & FORMS */
  .modal-overlay { display:none; position:fixed; inset:0; background:#000000bb; z-index:200; align-items:center; justify-content:center; padding:20px; }
  .modal-overlay.show { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:32px; width:100%; max-width:520px; }
  .form-group { margin-bottom:16px; }
  .form-group label { display:block; font-size:11px; color:var(--muted); text-transform:uppercase; margin-bottom:6px; }
  .form-group input, .form-group select, .form-group textarea { width:100%; background:var(--surface2); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:10px 12px; font-family:'DM Mono',monospace; outline:none; }
  
  #spare-input-container { display:none; margin-top: 10px; padding: 10px; border-left: 2px solid var(--waiting); background: #ff6b350a; }

  /* BUTTONS */
  .btn { border:none; border-radius:8px; padding:10px 20px; cursor:pointer; font-family:'Syne',sans-serif; font-weight:700; font-size:12px; }
  .add-btn { background:#4d9fff; color:#fff; }
  .refresh-btn { background:var(--accent); color:#000; }
  .claim-btn { background:var(--unassigned); color:#000; padding:6px 12px; font-size:11px; }
  
  #toast { position:fixed; bottom:30px; right:30px; padding:12px 20px; border-radius:10px; font-family:'Syne',sans-serif; font-weight:800; transform:translateY(100px); opacity:0; transition:0.3s; z-index:999; }
  #toast.show { transform:translateY(0); opacity:1; }
</style>
</head>
<body>

<div id="pin-screen">
  <div class="pin-title" style="font-family:'Syne'; font-size:24px; font-weight:800;">ENGINEER <span>ACCESS</span></div>
  <div class="pin-dots">
    <div class="pin-dot" id="dot-0"></div><div class="pin-dot" id="dot-1"></div><div class="pin-dot" id="dot-2"></div><div class="pin-dot" id="dot-3"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-key" onclick="pinPress('1')">1</button><button class="pin-key" onclick="pinPress('2')">2</button><button class="pin-key" onclick="pinPress('3')">3</button>
    <button class="pin-key" onclick="pinPress('4')">4</button><button class="pin-key" onclick="pinPress('5')">5</button><button class="pin-key" onclick="pinPress('6')">6</button>
    <button class="pin-key" onclick="pinPress('7')">7</button><button class="pin-key" onclick="pinPress('8')">8</button><button class="pin-key" onclick="pinPress('9')">9</button>
    <button class="pin-key" style="grid-column:2" onclick="pinPress('0')">0</button>
    <button class="pin-key" style="font-size:14px; color:var(--muted)" onclick="pinDelete()">DEL</button>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 style="font-family:'Syne'; margin-bottom:20px;">+ New Service Ticket</h2>
    <div class="form-group">
      <label>Clinic / Account *</label>
      <input type="text" id="f-clinic" placeholder="Clinic Name">
    </div>
    <div class="form-group">
      <label>Current Status</label>
      <select id="f-status" onchange="handleStatusChange(this.value)">
        <option value="In Progress">In Progress</option>
        <option value="Waiting">Waiting Parts</option>
        <option value="Closed">Closed</option>
      </select>
      <div id="spare-input-container">
        <label style="color:var(--waiting)">Specify Spare Parts Needed *</label>
        <input type="text" id="f-spare" placeholder="e.g. Vacuum Pump, Sensor Cable">
      </div>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
      <div class="form-group"><label>Phone</label><input type="text" id="f-phone"></div>
      <div class="form-group"><label>Location</label><input type="text" id="f-location"></div>
    </div>
    <div class="form-group"><label>Issue Description *</label><textarea id="f-desc" rows="3"></textarea></div>
    <div style="display:flex; gap:10px;">
      <button class="btn" style="flex:1; background:var(--surface2); color:var(--muted)" onclick="closeModal()">Cancel</button>
      <button class="btn add-btn" style="flex:2" onclick="submitTicket()" id="sub-btn">Create Ticket</button>
    </div>
  </div>
</div>

<div class="container" id="main" style="display:none">
  <header>
    <div class="logo-area"><h1 id="eng-title">My <span>Dashboard</span></h1></div>
    <div style="display:flex; gap:10px;">
      <button class="btn add-btn" onclick="openModal()">+ Add Ticket</button>
      <button class="btn refresh-btn" onclick="loadData()">Refresh</button>
      <button class="btn" style="background:transparent; border:1px solid var(--border); color:var(--muted)" onclick="location.reload()">Sign Out</button>
    </div>
  </header>

  <div id="loading" style="text-align:center; padding:50px;"><p>Fetching records...</p></div>

  <div id="content" style="display:none">
    <div class="stats-grid">
      <div class="stat-card active-slice" style="border-left:4px solid var(--open)"><small>AVAILABLE</small><div class="stat-value" id="c-new">0</div></div>
      <div class="stat-card active-slice" style="border-left:4px solid var(--inprogress)"><small>IN PROGRESS</small><div class="stat-value" id="c-pro">0</div></div>
      <div class="stat-card active-slice" style="border-left:4px solid var(--waiting)"><small>WAITING</small><div class="stat-value" id="c-wai">0</div></div>
      <div class="stat-card active-slice" style="border-left:4px solid var(--closed)"><small>CLOSED</small><div class="stat-value" id="c-clo">0</div></div>
    </div>

    <div class="table-section" id="new-tickets-section">
      <div class="table-header" style="color:var(--unassigned)">⚡ Available New Tickets</div>
      <div class="table-scroll"><table><thead><tr><th>Clinic</th><th>Contact</th><th>Issue</th><th>Action</th></tr></thead><tbody id="tbody-new"></tbody></table></div>
    </div>

    <div class="table-section">
      <div class="table-header">📋 My Active Tickets</div>
      <div class="table-scroll"><table><thead><tr><th>Clinic</th><th>Status</th><th>Spare Parts</th><th>Duration</th><th>Description</th></tr></thead><tbody id="tbody-mine"></tbody></table></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const SCRIPT = "https://script.google.com/macros/s/AKfycbyd87MSxzZUXwhU6S4R2p-JHNtHew0aMvVYmN59FyRHbEV7wQYr0RvI4Fpyj887Y9N8/exec";
const ENGINEERS = {
  "Shakeel": { pin:"1122", color:"#4d9fff", isIT:true },
  "Sam":     { pin:"1112", color:"#00e5a0", isIT:false },
  "Bernard": { pin:"1212", color:"#f0b429", isIT:false },
  "Ghulam":  { pin:"2111", color:"#ff6b35", isIT:false },
  "Ahmad":   { pin:"2211", color:"#a855f7", isIT:false }
};

let MY_NAME = "", allData = [], pinBuffer = "";

function pinPress(d){
  if(pinBuffer.length < 4) pinBuffer += d;
  updateDots();
  if(pinBuffer.length === 4) setTimeout(checkPin, 150);
}
function pinDelete(){ pinBuffer = pinBuffer.slice(0, -1); updateDots(); }
function updateDots(){
  for(let i=0; i<4; i++) document.getElementById('dot-'+i).className = i<pinBuffer.length?'pin-dot filled':'pin-dot';
}
function checkPin(){
  const found = Object.entries(ENGINEERS).find(([n, e]) => e.pin === pinBuffer);
  if(found){ MY_NAME = found[0]; unlock(); }
  else { pinBuffer = ""; updateDots(); }
}
function unlock(){
  document.getElementById('pin-screen').style.display = 'none';
  document.getElementById('main').style.display = 'block';
  document.getElementById('eng-title').innerHTML = MY_NAME + " - <span>Dashboard</span>";
  loadData();
}

function openModal(){ document.getElementById('modal').classList.add('show'); }
function closeModal(){ document.getElementById('modal').classList.remove('show'); }

function handleStatusChange(val){
  document.getElementById('spare-input-container').style.display = (val === 'Waiting') ? 'block' : 'none';
}

function showToast(m, c){
  const t = document.getElementById('toast');
  t.innerText = m; t.style.background = c || '#00e5a0';
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 3000);
}

async function submitTicket(){
  const clinic = document.getElementById('f-clinic').value.trim();
  const status = document.getElementById('f-status').value;
  const spare = document.getElementById('f-spare').value.trim();
  const desc = document.getElementById('f-desc').value.trim();

  if(!clinic || !desc) return showToast("Clinic & Description required", "#ff6b35");
  if(status === 'Waiting' && !spare) return showToast("Please name the spare parts", "#ff6b35");

  const btn = document.getElementById('sub-btn');
  btn.disabled = true; btn.innerText = "Saving...";

  const type = ENGINEERS[MY_NAME].isIT ? 'Computer / System (IT)' : 'Equipment / Dental Unit';

  try {
    await fetchJSONP(SCRIPT + `?action=addRow&timestamp=${encodeURIComponent(new Date().toISOString())}&name=${encodeURIComponent(MY_NAME)}&clinic=${encodeURIComponent(clinic)}&phone=${encodeURIComponent(document.getElementById('f-phone').value)}&location=${encodeURIComponent(document.getElementById('f-location').value)}&description=${encodeURIComponent(desc)}&ticketType=${encodeURIComponent(type)}&status=${encodeURIComponent(status)}&spareParts=${encodeURIComponent(spare)}`);
    closeModal(); showToast("Ticket Created!"); loadData();
  } catch(e){ showToast("Error connecting", "#ff4444"); }
  btn.disabled = false; btn.innerText = "Create Ticket";
}

function fetchJSONP(url){
  return new Promise(res => {
    const cb = 'cb' + Math.random().toString(36).substr(2);
    const s = document.createElement('script');
    window[cb] = d => { document.body.removeChild(s); res(d); };
    s.src = url + "&callback=" + cb;
    document.body.appendChild(s);
  });
}

async function loadData(){
  document.getElementById('loading').style.display = 'block';
  document.getElementById('content').style.display = 'none';
  try {
    const d = await fetchJSONP(SCRIPT);
    allData = d.filter(r => r.Timestamp).sort((a,b) => new Date(b.Timestamp) - new Date(a.Timestamp));
    render();
  } catch(e){ showToast("Failed to load", "#ff4444"); }
}

function render(){
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';

  const mine = allData.filter(r => r.Name === MY_NAME);
  const available = allData.filter(r => !r.Name || r.Name === "");

  document.getElementById('tbody-new').innerHTML = available.map(r => `
    <tr><td>${r['Customer/Account Name']||'Unknown'}</td><td>${r['Mobile Number']||'-'}</td><td>${r['Problem Description']||'-'}</td>
    <td><button class="btn claim-btn" onclick="claim('${r.Timestamp}')">Claim</button></td></tr>
  `).join('');

  document.getElementById('tbody-mine').innerHTML = mine.map(r => `
    <tr><td>${r['Customer/Account Name']}</td><td>${r['Current Status']}</td><td style="color:var(--waiting)">${r['What spare part is needed?']||'-'}</td>
    <td>-</td><td>${r['Problem Description']}</td></tr>
  `).join('');

  document.getElementById('c-new').innerText = available.length;
  document.getElementById('c-pro').innerText = mine.filter(r => r['Current Status'] === 'In Progress').length;
  document.getElementById('c-wai').innerText = mine.filter(r => r['Current Status'] === 'Waiting').length;
  document.getElementById('c-clo').innerText = mine.filter(r => r['Current Status'] === 'Closed').length;
}

async function claim(ts){
  showToast("Claiming...", "#4d9fff");
  try {
    await fetchJSONP(SCRIPT + `?action=claim&timestamp=${encodeURIComponent(ts)}&name=${encodeURIComponent(MY_NAME)}`);
    loadData();
  } catch(e){ showToast("Claim failed", "#ff4444"); }
}
</script>
</body>
</html>
